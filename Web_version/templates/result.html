<!DOCTYPE html>
<html>
<head>
    <title>Result - {{ name }}</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; text-align: center; }
        .card { background: white; padding: 40px; border-radius: 10px; margin-top: 30px; }
        .pass { color: green; font-size: 40px; }
        .fail { color: red; font-size: 40px; }
        a { color: #4CAF50; text-decoration: none; }
        h1 { color: #333; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Result for {{ name }}</h1>
        <p>Marks: <strong>{{ mark }} / 100</strong></p>

        {% if passed %}
            <p class="pass">✅ PASS</p>
        {% else %}
            <p class="fail">❌ FAIL</p>
        {% endif %}

        <br>
        <a href="/">← Back to Home</a>
    </div>
</body>
</html>
