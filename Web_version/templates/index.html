<!DOCTYPE html>
<html>
    <head>
        <title>
            ResultHub
        </title>
        <style>
            body {font-family: Aria; max-width: 600px; margin: 40px; background: #f5f5f5;}
            h1{color: black;}
            input{padding: 80x; margin: 5px; border: 1px solid #ccc; border-radius: 4px;}
            button{padding: 8px 16px; background: #4CAF50; color: white; border: none; border-radius: 4px; }
            table{width: 100%; border-collapse: collapse; background: white; margin-top: 20px;}
            th,td{padding: 10px;text-align: left;border-bottom: 1px solid #ddd;}
            th{background: #4aaabb;color: white;}
            a{color: #4CAF50;text-decoration: none;margin-right: 10px;}
            a.delete{color: red;}
            .nav a{background: #008CBA; color: white;padding: 8px 14px;border-radius: 4px;margin-right: 8px;}
        </style>
    </head>
    <body>
        <h1>🎓 ResultHub</h1>
        <div class="nav">
            <a href="/passed">✅ View Passed Students</a>
        </div>
        <h2>Add Student</h2>
        <form action="/add" method="POST">
            <input type="text" name="name" placeholder="Student name" required/>
            <input type="number" name="mark" placeholder="Marks(0-100)" required/>
            <button type="submit">Add</button>
        </form>
        <h2>All Students</h2>
        {% if students %}
        <table>
            <tr>
                <th>Name</th>
                <th>Marks</th>
                <th>Action</th>
            </tr>
            {% for name, mark in students.items() %}
            <tr>
                <td>
                    {{name}}
                </td>
                <td>{{mark}}</td>
                <td>
                    <a href="/result/{{name}}">Check Result</a>
                    <a href="/delete/{{name}}" class="delete">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </table>
        {% else %}
            <p> No Students added yet!</p>
        {% endif %}
    </body>
</html>
